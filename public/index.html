<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="TruthLens VisionGuide — AI-powered real-time navigation assistant for the visually impaired." />
  <title>TruthLens VisionGuide</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- Top bar -->
    <header class="topbar" id="topbar">
      <div class="live-badge" id="live-badge" hidden>
        <div class="live-badge__bars">
          <span></span><span></span><span></span><span></span>
        </div>
        <span class="live-badge__text">Live</span>
      </div>
    </header>

    <!-- Full-viewport camera feed -->
    <div class="viewport" id="viewport">
      <video id="camera-feed" autoplay playsinline muted></video>

      <!-- Glow border for voice activity -->
      <div class="viewport__glow" id="viewport-glow"></div>

      <!-- Idle screen (before session) -->
      <div class="idle-screen" id="idle-screen">
        <h1 class="idle-screen__title">TruthLens VisionGuide</h1>
        <p class="idle-screen__sub">AI-powered navigation assistant</p>
        <button class="btn-start" id="btn-start" aria-label="Start VisionGuide session">
          <!-- Mic SVG icon -->
          <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <p class="idle-screen__hint">Tap to start</p>
      </div>
    </div>

    <!-- Transcription overlay -->
    <div class="transcript" id="transcript" hidden>
      <span class="transcript__text" id="transcript-text"></span>
    </div>

    <!-- Voice activity indicator -->
    <div class="voice-indicator" id="voice-indicator" hidden>
      <div class="voice-indicator__bars" id="voice-bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="voice-indicator__label" id="voice-label">Listening</span>
    </div>

    <!-- Status toast -->
    <div class="toast" id="toast" hidden>
      <span id="toast-text"></span>
    </div>

    <!-- Bottom controls (shown when session is active) -->
    <div class="controls" id="controls" hidden>
      <button class="ctrl-btn" id="btn-mic" aria-label="Toggle microphone">
        <svg class="ctrl-icon ctrl-icon--on" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg class="ctrl-icon ctrl-icon--off" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>
        </svg>
      </button>

      <button class="ctrl-btn" id="btn-cam" aria-label="Toggle camera">
        <svg class="ctrl-icon ctrl-icon--on" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
        <svg class="ctrl-icon ctrl-icon--off" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 6.5l-4 4V7c0-.55-.45-1-1-1H9.82L21 17.18V6.5zM3.27 2L2 3.27 4.73 6H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-.73L21.73 22 23 20.73 3.27 2z"/>
        </svg>
      </button>

      <button class="ctrl-btn ctrl-btn--end" id="btn-end" aria-label="End session">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="js/hardware.js"></script>
  <script src="js/audio-handler.js"></script>
  <script src="js/camera-handler.js"></script>
  <script src="js/gemini-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
